version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - MAX_FILE_SIZE=104857600
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_MODEL=base
      - WHISPER_DEVICE=cpu
      - MAX_FILE_SIZE=104857600
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2  # Run 2 workers for parallel processing

volumes:
  redis_data:
